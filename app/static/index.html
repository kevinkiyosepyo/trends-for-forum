<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trends for Forum</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

    :root {
      --bg:       #1a1a2e;
      --surface:  #222240;
      --border:   #2e2e4a;
      --muted:    #4a4a6a;
      --text:     #eeeef5;
      --sub:      #9999bb;
      --green:    #00e676;
      --green-dim:#00c853;
      --yellow:   #ffd740;
      --red:      #ff5252;
      --blue:     #5c9aff;
      --purple:   #ce93d8;
      --radius:   12px;
      --font:     'Inter', -apple-system, 'Segoe UI', sans-serif;
      --mono:     'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13.5px;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(26,26,46,0.95);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; }
    .logo-badge { font-size: 10px; background: var(--blue); color: #fff; padding: 2px 7px; border-radius: 4px; letter-spacing: .08em; }

    .header-right { display: flex; align-items: center; gap: 14px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; }
    .status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #last-updated { color: var(--sub); font-size: 11px; }

    /* ── Tabs ── */
    .tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      background: rgba(26,26,46,0.7);
    }

    .tab-btn {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--sub);
      padding: 14px 20px 12px;
      transition: all .15s;
      border-radius: 0;
    }
    .tab-btn:hover { color: var(--text); opacity: 1; }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--blue);
    }
    .tab-btn.forum-tab.active {
      color: var(--yellow);
      border-bottom-color: var(--yellow);
    }

    /* ── Buttons ── */
    button {
      font-family: var(--font);
      font-size: 12.5px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      transition: opacity .15s;
    }
    button:hover { opacity: .8; }
    .btn-primary   { background: var(--blue); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--sub); border: 1px solid var(--border); }

    /* ── Controls ── */
    .controls {
      padding: 16px 28px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    #topic-input {
      font-family: var(--font);
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 7px 12px;
      width: 360px;
      outline: none;
    }
    #topic-input:focus { border-color: var(--blue); }
    #topic-input::placeholder { color: var(--muted); }

    .toggle-group { display: flex; gap: 6px; margin-left: auto; }
    .toggle-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--sub);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }
    .toggle-btn.active { border-color: var(--blue); color: var(--blue); background: rgba(68,138,255,.08); }

    /* ── Forum controls bar ── */
    .forum-info-bar {
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(255,215,64,.03);
      font-size: 11px;
      color: var(--sub);
    }
    .forum-info-bar .pill {
      background: rgba(255,215,64,.1);
      color: var(--yellow);
      border: 1px solid rgba(255,215,64,.2);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
    }

    /* ── Summary bar ── */
    .summary-bar {
      padding: 14px 28px;
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 10px; color: var(--sub); letter-spacing: .06em; text-transform: uppercase; }
    .stat-value { font-family: var(--mono); font-size: 18px; font-weight: 700; }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red    { color: var(--red); }
    .stat-value.blue   { color: var(--blue); }

    /* ── Trending bar ── */
    .trending-bar {
      padding: 10px 28px;
      background: rgba(68,138,255,.05);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .trending-label { font-size: 10px; color: var(--blue); text-transform: uppercase; letter-spacing: .08em; flex-shrink: 0; }
    .trending-chip {
      font-size: 11px;
      padding: 3px 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }
    .trending-chip:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
      padding: 20px 28px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .card:hover { border-color: var(--muted); transform: translateY(-1px); }

    .card.verdict-STRONG-BUY  { border-left: 3px solid var(--green); }
    .card.verdict-BUY         { border-left: 3px solid var(--green-dim); }
    .card.verdict-WATCH       { border-left: 3px solid var(--yellow); }
    .card.verdict-AVOID       { border-left: 3px solid var(--red); }
    .card.verdict-INSUFFICIENT{ border-left: 3px solid var(--muted); }

    /* Forum stock cards get a subtle gold tint */
    .card.forum-stock { background: #13120e; }
    .card.forum-stock.verdict-STRONG-BUY { border-left: 3px solid var(--green); background: rgba(0,230,118,.04); }
    .card.forum-stock.verdict-BUY        { border-left: 3px solid var(--green-dim); background: rgba(0,200,83,.03); }
    .card.forum-stock.verdict-WATCH      { border-left: 3px solid var(--yellow); background: rgba(255,215,64,.03); }
    .card.forum-stock.verdict-AVOID      { border-left: 3px solid var(--red); background: rgba(255,82,82,.03); }

    .card::before {
      content: attr(data-rank);
      position: absolute;
      top: 10px; right: 14px;
      font-size: 32px;
      font-weight: 900;
      color: rgba(255,255,255,.04);
      pointer-events: none;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .topic-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .ticker { font-size: 10px; color: var(--sub); margin-top: 2px; }

    .verdict-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 5px;
      white-space: nowrap;
      letter-spacing: .07em;
    }
    .badge-STRONG-BUY  { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
    .badge-BUY         { background: rgba(0,200,83,.12);  color: var(--green-dim); border: 1px solid rgba(0,200,83,.25); }
    .badge-WATCH       { background: rgba(255,215,64,.12); color: var(--yellow); border: 1px solid rgba(255,215,64,.25); }
    .badge-AVOID       { background: rgba(255,82,82,.12);  color: var(--red); border: 1px solid rgba(255,82,82,.25); }
    .badge-INSUFFICIENT{ background: rgba(255,255,255,.05); color: var(--sub); border: 1px solid var(--muted); }

    /* ── Score bars ── */
    .score-row { display: flex; align-items: center; gap: 10px; }
    .score-label { font-size: 11px; color: var(--sub); width: 70px; flex-shrink: 0; }
    .bar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width .6s ease; }
    .bar-fill.green  { background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.red    { background: var(--red); }
    .bar-fill.muted  { background: var(--muted); }
    .score-num { font-family: var(--mono); font-size: 12px; font-weight: 700; width: 38px; text-align: right; }

    /* ── Meta row ── */
    .meta-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .meta-item { display: flex; flex-direction: column; gap: 1px; }
    .meta-key   { font-size: 9px; color: var(--sub); text-transform: uppercase; letter-spacing: .07em; }
    .meta-val   { font-family: var(--mono); font-size: 12px; font-weight: 600; }
    .meta-val.green  { color: var(--green); }
    .meta-val.yellow { color: var(--yellow); }
    .meta-val.red    { color: var(--red); }
    .meta-val.blue   { color: var(--blue); }
    .meta-val.gold   { color: var(--yellow); }

    /* ── Mispricing highlight (Forum tab only) ── */
    .mispricing-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,215,64,.06);
      border: 1px solid rgba(255,215,64,.15);
      border-radius: 6px;
      padding: 8px 12px;
    }
    .mispricing-row .label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .07em; }
    .mispricing-row .val { font-size: 15px; font-weight: 700; }
    .mispricing-row .val.pos { color: var(--green); }
    .mispricing-row .val.neg { color: var(--red); }
    .mispricing-row .val.flat { color: var(--sub); }
    .mispricing-row .desc { font-size: 10px; color: var(--sub); }

    /* ── Stage pill ── */
    .stage-pill {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }
    .stage-Seed     { background: rgba(0,230,118,.12); color: var(--green); }
    .stage-SeriesA  { background: rgba(68,138,255,.12); color: var(--blue); }
    .stage-PreIPO   { background: rgba(255,215,64,.12); color: var(--yellow); }
    .stage-Public   { background: rgba(255,82,82,.1);   color: var(--red); }

    /* ── Source pills ── */
    .source-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .source-pill { font-size: 9px; padding: 2px 7px; border-radius: 4px; letter-spacing: .05em; }
    .src-ok   { background: rgba(0,230,118,.1); color: var(--green); border: 1px solid rgba(0,230,118,.2); }
    .src-stub { background: rgba(255,215,64,.08); color: var(--yellow); border: 1px solid rgba(255,215,64,.18); }
    .src-fail { background: rgba(255,82,82,.08); color: var(--red); border: 1px solid rgba(255,82,82,.18); }

    /* ── Explanation ── */
    .explanation {
      font-size: 11px;
      color: var(--sub);
      line-height: 1.7;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    /* ── Loading / Error ── */
    .loading, .error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--sub);
      font-size: 13px;
    }
    .error-msg { color: var(--red); }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <span class="logo-text">Trends for Forum</span>
    <span class="logo-badge">YC W26</span>
  </div>
  <div class="header-right">
    <span class="status-dot" id="status-dot"></span>
    <span id="last-updated">—</span>
    <button class="btn-secondary" onclick="clearCache()">Clear Cache</button>
    <button class="btn-primary" id="refresh-btn" onclick="handleRefresh()">⟳ Refresh</button>
  </div>
</header>

<!-- ── Tab nav ── -->
<div class="tab-nav">
  <button class="tab-btn active" id="tab-trending" onclick="switchTab('trending')">🔥 Trending</button>
  <button class="tab-btn forum-tab" id="tab-forum" onclick="switchTab('forum')">⚡ Forum Markets</button>
</div>

<!-- ── Trending tab controls ── -->
<div id="trending-controls" class="controls">
  <input id="topic-input" type="text" placeholder="Search any topic: AI agents, Drake, Bitcoin ETF ..." />
  <button class="btn-primary" onclick="loadSignals()">Analyze</button>
  <div class="toggle-group">
    <button class="toggle-btn active" id="view-grid" onclick="setView('grid')">Grid</button>
    <button class="toggle-btn" id="view-list" onclick="setView('list')">List</button>
  </div>
</div>

<!-- ── Forum tab controls ── -->
<div id="forum-controls" style="display:none" class="forum-info-bar">
  <span class="pill">⚡ LIVE FORUM MARKETS</span>
  <span>Scoring attention mispricing vs Google Trends momentum. Updated from Forum API.</span>
  <div class="toggle-group" style="margin-left:auto">
    <button class="toggle-btn active" id="view-grid-f" onclick="setView('grid')">Grid</button>
    <button class="toggle-btn" id="view-list-f" onclick="setView('list')">List</button>
  </div>
</div>

<!-- ── Trending bar (Trending tab only) ── -->
<div class="trending-bar" id="trending-bar" style="display:none">
  <span class="trending-label">🔥 Trending Now</span>
  <div id="trending-chips"></div>
</div>

<!-- ── Summary bar ── -->
<div class="summary-bar" id="summary-bar" style="display:none">
  <div class="stat"><span class="stat-label">Analyzed</span><span class="stat-value blue" id="s-total">—</span></div>
  <div class="stat"><span class="stat-label">Strong Buy</span><span class="stat-value green" id="s-sb">—</span></div>
  <div class="stat"><span class="stat-label">Buy</span><span class="stat-value green" id="s-buy">—</span></div>
  <div class="stat"><span class="stat-label">Watch</span><span class="stat-value yellow" id="s-watch">—</span></div>
  <div class="stat"><span class="stat-label">Avoid</span><span class="stat-value red" id="s-avoid">—</span></div>
  <div class="stat"><span class="stat-label">Top Pick</span><span class="stat-value" id="s-top" style="font-size:14px">—</span></div>
</div>

<!-- ── Content ── -->
<div id="content">
  <div class="loading" style="display:none" id="loader">
    <div class="spinner"></div>
    <span id="loader-text">Scanning Google Trends + Forum markets...</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
  let currentView  = 'grid';
  let activeTab    = 'trending';

  // ── Helpers ──────────────────────────────────────────────────

  function fmtPct(v) {
    if (v == null) return '<span style="color:var(--muted)">n/a</span>';
    const sign = v >= 0 ? '+' : '';
    const cls  = v > 0 ? 'green' : v < 0 ? 'red' : '';
    return `<span class="${cls}">${sign}${v.toFixed(1)}%</span>`;
  }

  function barColor(score) {
    if (score >= 75) return 'green';
    if (score >= 40) return 'yellow';
    return 'red';
  }

  function verdictClass(v)  { return 'badge-' + (v || 'WATCH').replace(/ /g, '-').toUpperCase(); }
  function stageClass(s)    { return 'stage-' + (s || '').replace(' ', ''); }

  function srcClass(v) {
    if (v === 'ok' || v === 'live') return 'src-ok';
    if (v === 'stub') return 'src-stub';
    return 'src-fail';
  }
  function srcLabel(k, v) {
    const icons = { google: '📡', forum: '⚡' };
    const icon  = icons[k] || '';
    if (v === 'ok' || v === 'live') return `${icon} ${k}`;
    if (v === 'stub') return `${icon} ${k} (est.)`;
    return `${icon} ${k} ✗`;
  }

  // ── Card: Trending tab (Google Trends focus, no mispricing) ──

  function renderTrendingCard(r, rank) {
    const v      = r.recommendation || 'WATCH';
    const vClass = v.replace(/\s+/g, '-').toUpperCase();
    const score  = r.ipo_score ?? 0;
    const conf   = r.confidence_score ?? 0;
    const stage  = r.stage || '?';
    const hours  = r.hours_since_emergence ?? '?';
    const ticker = r.ticker ? ` <span style="color:var(--sub);font-size:10px">[${r.ticker}]</span>` : '';

    const sourcePills = Object.entries(r.source_health || {})
      .map(([k, sv]) => `<span class="source-pill ${srcClass(sv)}">${srcLabel(k, sv)}</span>`)
      .join('');

    const forumChange    = r.forum_change_pct;
    const forumChangeStr = forumChange != null
      ? (forumChange >= 0 ? '+' : '') + forumChange.toFixed(1) + '%' : 'n/a';
    const fcCls = forumChange > 0 ? 'green' : forumChange < 0 ? 'red' : '';

    return `
    <div class="card verdict-${vClass}" data-rank="#${rank}">
      <div class="card-header">
        <div>
          <div class="topic-name">${r.topic}${ticker}</div>
          <div class="ticker">
            <span class="stage-pill ${stageClass(stage)}">${stage}</span>
            &nbsp;~${hours}h ago
          </div>
        </div>
        <span class="verdict-badge ${verdictClass(v)}">${v}</span>
      </div>

      <div>
        <div class="score-row">
          <span class="score-label">IPO Score</span>
          <div class="bar-track"><div class="bar-fill ${barColor(score)}" style="width:${score}%"></div></div>
          <span class="score-num">${score.toFixed(0)}</span>
        </div>
        <div class="score-row" style="margin-top:5px">
          <span class="score-label">Confidence</span>
          <div class="bar-track"><div class="bar-fill muted" style="width:${conf}%"></div></div>
          <span class="score-num" style="color:var(--sub)">${conf.toFixed(0)}%</span>
        </div>
      </div>

      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-key">Google Trends</span>
          <span class="meta-val">${fmtPct(r.google_growth)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Velocity</span>
          <span class="meta-val">${(r.velocity ?? 0).toFixed(1)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Forum Δ24h</span>
          <span class="meta-val ${fcCls}">${forumChangeStr}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Forum Price</span>
          <span class="meta-val blue">${(r.forum_price ?? 0).toFixed(0)}</span>
        </div>
      </div>

      <div class="source-row">${sourcePills}</div>
      ${r.explanation ? `<div class="explanation">${r.explanation}</div>` : ''}
    </div>`;
  }

  // ── Card: Forum Markets tab (mispricing front and center) ──

  function renderForumCard(r, rank) {
    const v      = r.recommendation || 'WATCH';
    const vClass = v.replace(/\s+/g, '-').toUpperCase();
    const score  = r.ipo_score ?? 0;
    const stage  = r.stage || '?';
    const ticker = r.ticker ? ` <span style="color:var(--sub);font-size:10px">[${r.ticker}]</span>` : '';

    const misprice    = r.mispricing ?? 0;
    const misCls      = misprice > 8 ? 'pos' : misprice < -8 ? 'neg' : 'flat';
    const misSign     = misprice >= 0 ? '+' : '';
    const misDesc     = misprice > 8  ? 'Underpriced — attention ahead of Forum price'
                      : misprice < -8 ? 'Overpriced — Forum ahead of attention'
                      : 'Fairly priced';

    const forumChange    = r.forum_change_pct;
    const forumChangeStr = forumChange != null
      ? (forumChange >= 0 ? '+' : '') + forumChange.toFixed(1) + '%' : 'n/a';
    const fcCls = forumChange > 0 ? 'green' : forumChange < 0 ? 'red' : '';

    const sourcePills = Object.entries(r.source_health || {})
      .filter(([k]) => k === 'forum')
      .map(([k, sv]) => `<span class="source-pill ${srcClass(sv)}">${srcLabel(k, sv)}</span>`)
      .join('');

    return `
    <div class="card forum-stock verdict-${vClass}" data-rank="#${rank}">
      <div class="card-header">
        <div>
          <div class="topic-name">${r.topic}${ticker}</div>
          <div class="ticker">
            <span class="stage-pill ${stageClass(stage)}">${stage}</span>
            &nbsp;Forum Listed
          </div>
        </div>
        <span class="verdict-badge ${verdictClass(v)}">${v}</span>
      </div>

      <div>
        <div class="score-row">
          <span class="score-label">Attn Score</span>
          <div class="bar-track"><div class="bar-fill ${barColor(score)}" style="width:${score}%"></div></div>
          <span class="score-num">${score.toFixed(0)}</span>
        </div>
      </div>

      <div class="mispricing-row">
        <div>
          <div class="label">Attention Mispricing</div>
          <div class="desc">${misDesc}</div>
        </div>
        <div class="val ${misCls}">${misSign}${misprice.toFixed(1)}</div>
      </div>

      <div class="meta-row">
        <div class="meta-item">
          <span class="meta-key">Forum Price</span>
          <span class="meta-val blue">${(r.forum_price ?? 0).toFixed(0)}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Forum Δ24h</span>
          <span class="meta-val ${fcCls}">${forumChangeStr}</span>
        </div>
        <div class="meta-item">
          <span class="meta-key">Momentum</span>
          <span class="meta-val">${(r.forum_momentum ?? 50).toFixed(0)}</span>
        </div>
      </div>

      <div class="source-row">${sourcePills}</div>
    </div>`;
  }

  // ── Summary bar ──────────────────────────────────────────────

  function updateSummary(results, topPick) {
    const counts = { 'STRONG BUY': 0, 'BUY': 0, 'WATCH': 0, 'AVOID': 0 };
    results.forEach(r => { if (counts[r.recommendation] !== undefined) counts[r.recommendation]++; });
    document.getElementById('s-total').textContent = results.length;
    document.getElementById('s-sb').textContent    = counts['STRONG BUY'];
    document.getElementById('s-buy').textContent   = counts['BUY'];
    document.getElementById('s-watch').textContent = counts['WATCH'];
    document.getElementById('s-avoid').textContent = counts['AVOID'];
    document.getElementById('s-top').textContent   = topPick || '—';
    document.getElementById('summary-bar').style.display = 'flex';
  }

  // ── Sort ─────────────────────────────────────────────────────

  const VERDICT_ORDER = { 'STRONG BUY': 0, 'BUY': 1, 'WATCH': 2, 'AVOID': 3, 'INSUFFICIENT DATA': 4 };
  function sortByVerdict(results) {
    return [...results].sort((a, b) => {
      const va = VERDICT_ORDER[a.recommendation] ?? 3;
      const vb = VERDICT_ORDER[b.recommendation] ?? 3;
      if (va !== vb) return va - vb;
      return (b.ipo_score ?? 0) - (a.ipo_score ?? 0);
    });
  }

  // ── Trending bar ─────────────────────────────────────────────

  async function loadTrending() {
    try {
      const r = await fetch('/trending');
      if (!r.ok) return;
      const data   = await r.json();
      const topics = data.topics || [];
      if (!topics.length) return;
      const chips = document.getElementById('trending-chips');
      chips.innerHTML = topics.slice(0, 14).map(t =>
        `<span class="trending-chip" onclick="analyzeTopic('${t.title.replace(/'/g,"\\'")}')">
          ${t.title} <span style="color:var(--sub)">${t.approx_traffic}</span>
        </span>`
      ).join('');
      document.getElementById('trending-bar').style.display = 'flex';
    } catch(e) {}
  }

  function analyzeTopic(title) {
    document.getElementById('topic-input').value = title;
    loadSignals();
  }

  // ── Render ────────────────────────────────────────────────────

  function showLoading(text) {
    document.getElementById('loader-text').textContent = text || 'Scanning...';
    document.getElementById('loader').style.display = 'block';
    document.getElementById('grid').innerHTML = '';
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('refresh-btn').textContent = '⟳ Loading...';
  }

  function showError(msg) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('grid').innerHTML = `<div class="error-msg">⚠ ${msg}</div>`;
    document.getElementById('refresh-btn').textContent = '⟳ Refresh';
  }

  function renderResults(results, topPick, isForum) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('refresh-btn').textContent = '⟳ Refresh';
    document.getElementById('status-dot').className = 'status-dot live';
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    const sorted = sortByVerdict(results);
    updateSummary(sorted, topPick);

    const grid = document.getElementById('grid');
    if (!sorted.length) {
      grid.innerHTML = '<div class="loading">No results returned.</div>';
      return;
    }

    grid.style.gridTemplateColumns = currentView === 'list'
      ? '1fr' : 'repeat(auto-fill, minmax(340px, 1fr))';

    grid.innerHTML = sorted.map((r, i) =>
      isForum ? renderForumCard(r, i + 1) : renderTrendingCard(r, i + 1)
    ).join('');
  }

  // ── Data fetchers ─────────────────────────────────────────────

  function getTopicsFromInput() {
    const raw = document.getElementById('topic-input').value.trim();
    if (!raw) return null;
    return raw.split(',').map(t => t.trim()).filter(Boolean);
  }

  async function loadSignals() {
    const topics = getTopicsFromInput();
    if (!topics || !topics.length) return loadTrendingAnalysis();
    showLoading('Analyzing topics via Google Trends...');
    try {
      const url = '/ipo?' + topics.map(t => `topics=${encodeURIComponent(t)}`).join('&');
      const r   = await fetch(url);
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const data = await r.json();
      renderResults(data.results || [], data.top_pick, false);
    } catch(e) { showError(e.message); }
  }

  async function loadTrendingAnalysis() {
    showLoading('Loading today\'s top Google Trends...');
    try {
      const r    = await fetch('/ipo/trending?top_n=12');
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const data = await r.json();
      renderResults(data.results || [], data.top_pick, false);
    } catch(e) { showError(e.message); }
  }

  async function loadForumStocks() {
    showLoading('Fetching live Forum markets + scoring mispricing...');
    try {
      const r    = await fetch('/ipo/forum-stocks');
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      const data = await r.json();
      renderResults(data.results || [], data.top_pick, true);
    } catch(e) { showError(e.message); }
  }

  async function clearCache() {
    try {
      await fetch('/cache/clear', { method: 'POST' });
      document.getElementById('last-updated').textContent = 'Cache cleared';
    } catch(e) {}
  }

  // ── Tab switching ─────────────────────────────────────────────

  function switchTab(tab) {
    activeTab = tab;

    document.getElementById('tab-trending').className = 'tab-btn' + (tab === 'trending' ? ' active' : '');
    document.getElementById('tab-forum').className    = 'tab-btn forum-tab' + (tab === 'forum' ? ' active' : '');

    const isTrending = tab === 'trending';
    document.getElementById('trending-controls').style.display = isTrending ? 'flex'  : 'none';
    document.getElementById('forum-controls').style.display    = isTrending ? 'none'  : 'flex';
    document.getElementById('trending-bar').style.display      = isTrending ? 'flex'  : 'none';

    document.getElementById('summary-bar').style.display = 'none';
    document.getElementById('grid').innerHTML = '';

    if (tab === 'trending') {
      loadTrendingAnalysis();
    } else {
      loadForumStocks();
    }
  }

  function handleRefresh() {
    if (activeTab === 'forum') loadForumStocks();
    else loadSignals();
  }

  // ── View toggle ───────────────────────────────────────────────

  function setView(v) {
    currentView = v;
    ['view-grid','view-grid-f'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'toggle-btn' + (v === 'grid' ? ' active' : '');
    });
    ['view-list','view-list-f'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'toggle-btn' + (v === 'list' ? ' active' : '');
    });
    document.getElementById('grid').style.gridTemplateColumns =
      v === 'list' ? '1fr' : 'repeat(auto-fill, minmax(340px, 1fr))';
  }

  // ── Enter key ─────────────────────────────────────────────────

  document.getElementById('topic-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadSignals();
  });

  // ── Init ──────────────────────────────────────────────────────

  loadTrending();
  loadTrendingAnalysis();
</script>
</body>
</html>
